<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarm Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Story+Script&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Libertinus+Serif+Display&display=swap" rel="stylesheet">
    <link href="https://db.onlinewebfonts.com/c/84cb021d5f9af287ffff84b61beef6dc?family=clockicons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="alarm">
                 ALARM
            </div>
        </nav>
    </header>
    <div class="container1">
      <h2 id="time-h2"></h2>
    </div>
    <div class="container2">
        <h1>CREATE NEW ALARM</h1>
        <div class="insidecontainer">
            <div class="box1 boxs">
                <select>
                    <option value="hour">HOUR</option>
                </select>
            </div>
            <div class="box2 boxs">
                <select>
                    <option value="minute">MINUTE</option>
                </select>
            </div>
            <div class="box3 boxs">
                <select>
                    <option value="second">SECOND</option>
                </select>
            </div>
        </div>
        <button id="btn1">Set Alarm</button>
        <ul id="ul"></ul>
        <!-- <input class="time" type="number"> -->
    </div>
    <script src="new.js"></script>
</body>
</html>
